<!DOCTYPE html>
<html>
<head>
    <title>Gerador de Cargas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 600px;
            margin: auto;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Gerador de Cargas</h1>
    <form action="/generate-load" method="post" id="load-generator-form">
        <label for="endpoint">Endpoint da API:</label>
        <input type="text" id="endpoint" name="endpoint" value="http://127.0.0.1:8000/generate-load" required>

        <label for="job_id">Job ID:</label>
        <input type="text" id="job_id" name="job_id" value="123e4567-e89b-12d3-a456-426614174001" required>

        <label for="history_days">Dias de Histórico:</label>
        <input type="number" id="history_days" name="history_days" value="7" required>

        <label for="quantidade_linhas">Quantidade de Linhas:</label>
        <input type="number" id="quantidade_linhas" name="quantidade_linhas" value="100000" required>

        <label for="tamanho_arquivo">Tamanho do Arquivo:</label>
        <input type="number" id="tamanho_arquivo" name="tamanho_arquivo" value="1000" required>

        <label for="min_value">Valor Mínimo:</label>
        <input type="number" id="min_value" name="min_value" value="300" required>

        <label for="avg_value">Valor Médio:</label>
        <input type="number" id="avg_value" name="avg_value" value="550" required>

        <label for="max_value">Valor Máximo:</label>
        <input type="number" id="max_value" name="max_value" value="999" required>

        <label for="stddev">Desvio Padrão:</label>
        <input type="number" id="stddev" name="stddev" value="200" required>

        <label for="repeat">Repetições:</label>
        <input type="number" id="repeat" name="repeat" value="31" required>

        <label for="delay">Intervalo entre Requisições (segundos):</label>
        <input type="number" id="delay" name="delay" value="1" required>

        <label for="variation_factor">Fator de Variação:</label>
        <input type="number" step="0.01" id="variation_factor" name="variation_factor" value="0.1" required>

        <label for="trend">Tendência:</label>
        <select id="trend" name="trend">
            <option value="up">Crescente</option>
            <option value="down">Decrescente</option>
            <option value="">Aleatória</option>
        </select>

        <button type="submit">Gerar Cargas</button>
    </form>
    <script>
        const form = document.getElementById("load-generator-form");
        form.addEventListener("submit", async (event) => {
            event.preventDefault(); // Impede o envio padrão do formulário

            const formData = new FormData(form);
            const jsonPayload = Object.fromEntries(formData.entries()); // Converte os dados do formulário para JSON

            try {
                const response = await fetch(form.action, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json", // Define o cabeçalho como JSON
                    },
                    body: JSON.stringify(jsonPayload), // Envia os dados como JSON
                });

                if (response.ok) {
                    const result = await response.json();
                    alert("Cargas geradas com sucesso!");
                    console.log("Resposta do servidor:", result);
                } else {
                    const error = await response.json();
                    alert("Erro ao gerar cargas: " + error.detail);
                    console.error("Erro do servidor:", error);
                }
            } catch (err) {
                console.error("Erro na requisição:", err);
                alert("Erro ao enviar a requisição. Verifique o console para mais detalhes.");
            }
        });
    </script>
</body>
</html>
